services:
  db:
    image: postgres:18.1
    container_name: postgres-dev
    ports:                                                                 
        - "5432:5432"
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: change_me
      POSTGRES_USER: spotifou
      POSTGRES_DB: spotifou
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/data_seed.sql:/docker-entrypoint-initdb.d/data_seed.sql
  adminer:
    image: adminer
    restart: always
    ports:
      - 9090:8080

volumes:
  postgres-data:

    